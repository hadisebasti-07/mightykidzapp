type User @table {
  displayName: String!
  email: String!
  role: String!
  photoUrl: String
  phoneNumber: String
}

type Child @table {
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  medicalNotes: String
  allergies: String
  emergencyContactName: String
  emergencyContactPhone: String
  parent: User
}

type Event @table {
  name: String!
  date: Date!
  startTime: String!
  endTime: String!
  ageGroupMin: Int!
  ageGroupMax: Int!
  description: String
  location: String
}

type Registration @table(key: ["child", "event"]) {
  child: Child!
  event: Event!
  registrationDate: Timestamp!
  status: String!
}

type Assignment @table(key: ["volunteer", "event"]) {
  volunteer: User!
  event: Event!
  role: String!
}

type Attendance @table(key: ["child", "event"]) {
  child: Child!
  event: Event!
  attendanceDate: Date!
  checkedInAt: Timestamp!
  checkedOutAt: Timestamp
  notes: String
}