# 1. Query to retrieve all events accessible to the public
query PublicEvents @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it retrieves general event information.") {
  events(orderBy: [{date: ASC}, {startTime: ASC}]) {
    id
    name
    date
    startTime
    endTime
    ageGroupMin
    ageGroupMax
    location
    description
  }
}

# 2. Query to retrieve children associated with the currently logged-in user
query MyChildren @auth(level: USER) {
  children(where: {parentId: {eq_expr: "auth.uid"}}) {
    id
    firstName
    lastName
    dateOfBirth
    medicalNotes
    allergies
    emergencyContactName
    emergencyContactPhone
  }
}

# 3. Mutation to register a child for an event
mutation RegisterChildForEvent($childId: UUID!, $eventId: UUID!) @auth(level: USER) {
  registration_insert(data: {
    childId: $childId,
    eventId: $eventId,
    registrationDate_expr: "request.time",
    status: "REGISTERED"
  })
}

# 4. Mutation to update a user's display name
mutation UpdateMyDisplayName($newDisplayName: String!) @auth(level: USER) {
  user_update(
    key: {id_expr: "auth.uid"},
    data: {displayName: $newDisplayName}
  )
}